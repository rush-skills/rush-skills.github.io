      - React
      - TypeScript
      - Cloudflare
      - Lucide

  - title: "iJewel Studio"
    subtitle: "3D jewelry rendering platform"
    image: "/projects/ijewel-studio.jpg"
    description: "Platform for jewelry designers to upload, optimize, and render 3D models with photorealistic quality. Features Blender-based mesh optimization, async job queues, and scalable serverless backend."
    body: |
      iJewel Studio lets jewelry designers upload their 3D models and get
      photorealistic renders back — no render farm, no graphics workstation. The
      hard part is the pipeline: raw 3D jewelry models are heavy and inconsistent,
      so the platform runs **Blender-based mesh optimization** to clean and lighten
      them, pushes the expensive work through async job queues, and renders on a
      serverless backend that scales up only when there's work to do.

      The in-browser viewer uses WebGi for real-time, photoreal 3D. Built for
      Pixotronics on Next.js and React, with Supabase, Cloudflare Workers, and
      Cloud Run carrying the compute-heavy stages.
    icon: "ugllxeyl"
    status: "Enterprise"
    featured: true
    links:
      - url: "https://ijewel.studio/"
        icon: "hmqxevgf"
        label: "Website"
    tech:
      - Next.js
      - React
      - Supabase
      - Cloudflare Workers
      - Cloud Run
      - Blender
      - WebGi

  - title: "SquareCubed"
    subtitle: "AI-assisted 3D showroom for Square stores"
    image: "/projects/squarecubed.jpg"
    description: 'Virtual 3D showroom for Square e-commerce stores using Vertex AI for product understanding and WebGi for real-time rendering. Won Square + Google AI Hackathon 2023 ("Best reinvention of in-person & online experiences").'
    body: |
      SquareCubed turns a flat Square e-commerce store into a virtual 3D showroom
      you can walk through. It uses **Vertex AI** to understand a store's products
      and **WebGi** to render them in real time, so a merchant's existing catalog
      becomes an explorable space with no extra 3D modeling work.

      It won the **Square + Google AI Hackathon 2023**, taking "Best reinvention of
      in-person & online experiences." Built with Svelte and Next.js on the WebGi
      SDK, with Cloudflare Workers tying it together.
    icon: "oajcrtsi"
