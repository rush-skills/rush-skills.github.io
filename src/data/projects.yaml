  - title: "ComicAdda"
    subtitle: "India's standup comedy discovery platform"
    image: "/projects/comicadda.jpg"
    description: "Discover Indian standup comedians by language, city, and style. Watch tracking, ratings, follow system, and personalized newsletters. Entirely built using AI agents orchestrating parallel development and data-mining workflows."
    body: |
      India's standup scene is thriving across a dozen languages and as many
      cities, but it's scattered — comedians live across YouTube, Instagram, and
      ticketing sites with no single place to discover them. ComicAdda pulls them
      together: browse by language, city, and style, track what you've watched,
      rate specials, follow comedians, and get a personalized newsletter when the
      people you follow drop something new.

      What makes it unusual is how it's built. ComicAdda is **entirely built by AI
      agents** — I set up workflows where agents orchestrate parallel development
      and run the data-mining pipelines that keep the catalog current, scraping and
      enriching comedian and special metadata across sources. It's as much an
      experiment in agent-driven engineering as it is a product.

      Under the hood it's Next.js 15 and React 19, with Supabase and Postgres for
      data and Cloudflare at the edge.
    icon: "ebvizisb"
    status: "Live"
    featured: true
    links:
      - url: "https://comicadda.com/"
        icon: "hmqxevgf"
        label: "Website"
    tech:
      - Next.js 15
      - React 19
      - Supabase
      - PostgreSQL
      - Tailwind CSS
      - Cloudflare

  - title: "Dubai Deals"
    subtitle: "Restaurant deals aggregator for Dubai"
    image: "/projects/dubai-deals.jpg"
    description: "Aggregates dining discounts from Careem, Zomato, Talabat, and other delivery apps into one searchable, location-aware interface, so you can compare every dining deal in Dubai without opening each app individually."
    body: |
      Every delivery app in Dubai — Careem, Zomato, Talabat — runs its own dining
      discounts, so finding the best deal near you means hunting through four apps.
      Dubai Deals aggregates them into one searchable, location-aware interface:
      every dining offer in the city, filtered to where you are, without opening a
      single delivery app.

      It's a fast, static-first Astro site with React islands for the interactive
      search and filtering, TypeScript throughout, deployed on Cloudflare.
    icon: "dkobpcrm"
    status: "Live"
    featured: true
    links:
      - url: "https://dubaideals.live/"
        icon: "hmqxevgf"
        label: "Website"
    tech:
