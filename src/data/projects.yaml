  - title: "Mouve"
    subtitle: "Animated Instagram stories"
    image: "/projects/mouve.jpg"
    description: "Animated story maker for Instagram powered by a Unity rendering engine. 100k+ Play Store downloads."
    body: |
      Mouve was an animated story maker for Instagram, built before story-creation
      tools were everywhere. You composed animated stories that a **Unity rendering
      engine** turned into polished, shareable video. It found a real audience —
      **100k+ downloads on the Play Store** — before I archived it.

      Backend on Node.js and Sails.js, with Unity doing the heavy rendering.
