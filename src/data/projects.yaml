  - title: "WSC"
    subtitle: "Multi-interface writing style linter"
    image: "/projects/wsc.jpg"
    description: "Detects weasel words, passive voice, duplicates, long sentences, nominalizations, hedging, filler adverbs, and AI tells across 8 detectors with 800+ entries. Available as a web editor, HTTP API, remote & local MCP server, CLI, and GitHub Action."
    body: |
      WSC (Writing Style Checker) is a linter for prose. It flags the things that
      quietly weaken writing — weasel words, passive voice, duplicates, overlong
      sentences, nominalizations, hedging, filler adverbs, and the tells of
      AI-generated text — across **8 detectors backed by 800+ curated entries**.

      The idea is that it should meet you wherever you write: a web editor, an HTTP
      API, a CLI, a GitHub Action for CI, and both **remote and local MCP servers**
      so AI assistants can lint through the same engine. Open source, built on
      SvelteKit and TypeScript, deployed on Cloudflare Workers.
    icon: "exymduqj"
    status: "Open Source"
    featured: false
    links:
