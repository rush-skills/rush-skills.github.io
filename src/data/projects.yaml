  - title: "Cloudflare Cost Calculator"
    subtitle: "Estimate your Cloudflare bill"
    image: "/projects/cloudflare-cost-calculator.jpg"
    description: "Interactive calculator for estimating Cloudflare infrastructure costs across Workers, D1, R2, KV, and Durable Objects."
    body: |
      Cloudflare's developer platform is cheap, but its pricing spans Workers, D1,
      R2, KV, and Durable Objects — each with its own request, storage, and
      operation tiers — so "what will this actually cost?" is harder to answer than
      it should be. This calculator lets you model a workload across all of them and
      get a realistic monthly estimate before you commit.

      A small, fast Astro and React tool, part of the TheServerlessDev calculators.
    icon: "bsdkzyjd"
    status: "Live"
    featured: false
    links:
      - url: "https://theserverless.dev/calculators/"
        icon: "hmqxevgf"
        label: "Website"
    tech:
      - Astro
      - React
      - CSS

  - title: "VisTracer"
    subtitle: "Visual traceroute on a 3D globe"
    image: "/projects/vistracer.jpg"
    description: "Desktop app that executes native traceroute, enriches hops with GeoIP/ASN metadata from 5 providers (MaxMind, Team Cymru, RDAP, RIPE Stat, PeeringDB), and renders animated routes on an interactive 3D globe with day/night terminator and latency-colored arcs."
    body: |
      VisTracer makes `traceroute` visual. It runs a **native traceroute**, enriches
      every hop with GeoIP and ASN metadata pulled from **five providers** — MaxMind,
      Team Cymru, RDAP, RIPE Stat, and PeeringDB — and draws the resulting path on an
      interactive **3D globe**, complete with a real day/night terminator and arcs
      colored by latency.

      The desktop shell is **Tauri** — a Rust core behind a web frontend — which keeps
      the binary small and, more importantly, lets the Rust side handle the privileged
      native networking a traceroute needs. The globe and interface are React and
      Three.js with Zustand for state, bundled by Vite. Open source on GitHub.
    icon: "rpviwvwn"
    status: "Open Source"
    featured: false
    links:
      - url: "https://vistracer.anks.in"
        icon: "hmqxevgf"
        label: "Website"
      - url: "https://github.com/rush-skills/vistracer"
        icon: "jjxzcivr"
        label: "GitHub"
