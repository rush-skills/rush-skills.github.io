  - title: "HireLoom"
    subtitle: "Referral-first job search for India"
    image: "/projects/hireloom.jpg"
    description: "Job board aggregator for tech roles in India and remote-from-India positions. Scrapes 300+ company career pages, matches jobs to resumes using AI (BYOK: OpenAI, Anthropic, Gemini), and surfaces referral paths from LinkedIn connections."
    body: |
      The Indian tech job hunt is fragmented and runs on referrals, so HireLoom is
      built around both facts. It aggregates roles from **300+ company career pages**
      (plus remote-from-India positions), matches them against your resume with AI on
      a **bring-your-own-key** basis — OpenAI, Anthropic, or Gemini — and, the part I
      care about most, surfaces **referral paths** by mapping each opening to your
      LinkedIn connections, so you apply where you actually know someone.

      A serverless, edge-native build: Astro and React on the front, Hono on
      Cloudflare Workers, with D1, R2, and Drizzle ORM. A work in progress.
    icon: "wjyqkiew"
    status: "WIP"
    featured: false
    links:
