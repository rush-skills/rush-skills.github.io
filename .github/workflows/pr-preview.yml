name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: surge-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Secrets aren't exposed to workflows triggered by fork PRs, so only run
    # for PRs whose head branch lives in this repository.
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      # Surge auth token. Add it under Settings -> Secrets and variables ->
      # Actions as SURGE_TOKEN. Steps below are skipped until it is present,
      # so this workflow stays green before the secret is configured.
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      PREVIEW_DOMAIN: anks-in-pr-${{ github.event.number }}.surge.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.SURGE_TOKEN != '' && github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.SURGE_TOKEN != '' && github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: env.SURGE_TOKEN != '' && github.event.action != 'closed'
        run: npm run build

      - name: Deploy to Surge
        if: env.SURGE_TOKEN != '' && github.event.action != 'closed'
        # The site now builds with the Cloudflare adapter (dist/client = static
        # assets + prerendered pages; dist/server = the Worker). Surge is static-
        # only, so it previews the marketing pages from dist/client; /blog and
        # /admin (SSR) only work on the real Cloudflare deploy.
        run: npx --yes surge ./dist/client "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN"

      - name: Tear down Surge preview
        if: env.SURGE_TOKEN != '' && github.event.action == 'closed'
        continue-on-error: true
        run: npx --yes surge teardown "$PREVIEW_DOMAIN" --token "$SURGE_TOKEN"

      - name: Comment preview URL
        if: env.SURGE_TOKEN != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- surge-preview -->';
            const domain = process.env.PREVIEW_DOMAIN;
            const closed = context.payload.action === 'closed';
            const body = closed
              ? `${marker}\n🧹 Surge preview for this PR has been torn down.`
              : `${marker}\n🚀 **Preview deployed to Surge:** https://${domain}\n\n<sub>Updated for ${context.sha.slice(0, 7)} · tears down automatically when this PR closes.</sub>`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
