name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Publishing happens by committing the built site to the `gh-pages` branch,
# so Pages must be configured as: Settings -> Pages -> Build and deployment ->
# Source: "Deploy from a branch" -> Branch: gh-pages / (root).
permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          # Keep per-PR preview folders intact when the main site redeploys.
          clean-exclude: pr-preview/
